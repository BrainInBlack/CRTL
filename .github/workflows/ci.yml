name: CI

# Runs on GitHub Actions.
on:
  push:
  pull_request:

# Least privilege: this workflow only reads the repo to type-check, test, and build it.
permissions:
  contents: read

jobs:
  build:
    # Type-check, test, and build are OS-independent, so a single Linux runner is
    # enough. Pinned to Node 24 (current Active LTS), matching engines and the
    # CONTRIBUTING support claim.
    strategy:
      fail-fast: false
      matrix:
        node: [24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Regenerate bundled icons (must match what's committed)
        run: |
          npm run gen-icons
          git diff --exit-code src/icons.bundled.js \
            || (echo "::error::src/icons.bundled.js is stale - run 'npm run gen-icons' and commit the result." && exit 1)
      - name: Build single-file CRTL.html (local)
        run: npm run build
      - name: Build hosted web version
        run: npm run build:web

  # Stable required-status gate. Branch protection requires only this job, so a
  # Node-matrix bump or a rename of `build` never invalidates the required check.
  ci-success:
    needs: [build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify the build job succeeded
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::build job did not succeed (result: ${{ needs.build.result }})"
            exit 1
          fi
